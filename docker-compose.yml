services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: ""
      LABEL_PATH: ""
      DEVICE: cpu
      SEQUENCE_LENGTH: 32
      CONFIDENCE_THRESHOLD: 0.6
      BACKEND_CORS_ORIGINS: http://localhost:3000